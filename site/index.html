<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXP Notes</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sidebar-w: 272px;
      --sidebar-bg: #6b3e92;
      --sidebar-hover: #7d4aaa;
      --sidebar-active-bg: #4a2870;
      --sidebar-border: #5a3280;
      --accent: #d8b4fe;
      --accent-dim: #9333ea;
      --text-primary: #faf5ff;
      --text-secondary: #e9d5ff;
      --text-dim: #c4b5fd;
      --content-bg: #fdf4ff;
      --content-max: 820px;
      --top-h: 52px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, Roboto, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--content-bg);
      color: #111827;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--sidebar-border);
      overflow: hidden;
    }

    .brand {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }

    .brand-name {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand h1 {
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .brand-sub {
      color: var(--text-dim);
      font-size: 11px;
      margin-top: 3px;
      padding-left: 37px;
    }

    .search-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }

    .search-box {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: #5a3280;
      border: 1px solid #7d4aaa;
      border-radius: 7px;
      color: var(--text-primary);
      padding: 7px 10px 7px 30px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--accent-dim); }

    .nav {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px 12px;
    }

    .nav::-webkit-scrollbar { width: 3px; }
    .nav::-webkit-scrollbar-track { background: transparent; }
    .nav::-webkit-scrollbar-thumb { background: #7d4aaa; border-radius: 3px; }

    .cat-block {
      margin-bottom: 2px;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      user-select: none;
      transition: background 0.12s;
    }

    .cat-header:hover { background: var(--sidebar-hover); color: var(--text-primary); }

    .cat-icon {
      font-size: 12px;
      flex-shrink: 0;
    }

    .cat-arrow {
      margin-left: auto;
      font-size: 9px;
      color: var(--text-dim);
      transition: transform 0.18s;
    }

    .cat-block.open .cat-arrow { transform: rotate(90deg); }

    .cat-files {
      display: none;
      padding: 2px 0 4px 6px;
    }

    .cat-block.open .cat-files { display: block; }

    .file-item {
      display: block;
      padding: 5px 10px 5px 26px;
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 12.5px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.1s, color 0.1s;
      margin: 1px 0;
      line-height: 1.4;
    }

    .file-item:hover { background: var(--sidebar-hover); color: var(--text-primary); }

    .file-item.active {
      background: var(--sidebar-active-bg);
      color: #e0e7ff;
      font-weight: 500;
    }

    .empty-search {
      padding: 16px 12px;
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
    }

    /* ── Main ─────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .topbar {
      height: var(--top-h);
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #6b7280;
      min-width: 0;
    }

    .breadcrumb .bc-cat {
      white-space: nowrap;
      flex-shrink: 0;
    }

    .breadcrumb .bc-sep { color: #d1d5db; flex-shrink: 0; }

    .breadcrumb .bc-name {
      color: #111827;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 40px 32px;
    }

    .content-scroll::-webkit-scrollbar { width: 5px; }
    .content-scroll::-webkit-scrollbar-track { background: transparent; }
    .content-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }

    /* Welcome screen */
    .welcome {
      max-width: var(--content-max);
      margin: 80px auto 0;
      text-align: center;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #9333ea, #c084fc);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    /* Loading */
    .loading {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 60px 0;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
    }

    /* Markdown content */
    .md-body {
      max-width: var(--content-max);
      margin: 0 auto;
      line-height: 1.72;
      color: #1f2937;
      font-size: 15px;
    }

    .md-body h1 {
      font-size: 26px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e5e7eb;
      line-height: 1.3;
    }

    .md-body h2 {
      font-size: 19px;
      font-weight: 700;
      color: #1f2937;
      margin: 32px 0 12px;
    }

    .md-body h3 {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin: 24px 0 8px;
    }

    .md-body h4, .md-body h5, .md-body h6 {
      font-size: 14px;
      font-weight: 600;
      color: #4b5563;
      margin: 18px 0 6px;
    }

    .md-body p { margin-bottom: 14px; }

    .md-body ul, .md-body ol {
      margin: 0 0 14px 22px;
    }

    .md-body li { margin-bottom: 5px; }
    .md-body li > ul, .md-body li > ol { margin-top: 4px; margin-bottom: 4px; }

    .md-body code {
      background: #f3e8ff;
      border: 1px solid #e9d5ff;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      color: #9333ea;
    }

    .md-body pre {
      background: #1f2937;
      border-radius: 9px;
      padding: 18px 20px;
      margin-bottom: 18px;
      overflow-x: auto;
    }

    .md-body pre code {
      background: none;
      border: none;
      color: #e5e7eb;
      padding: 0;
      font-size: 13px;
    }

    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 0 4px 16px;
      color: #6b7280;
      margin-bottom: 14px;
      font-style: italic;
    }

    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .md-body th, .md-body td {
      border: 1px solid #e5e7eb;
      padding: 9px 14px;
      text-align: left;
    }

    .md-body th {
      background: #f9fafb;
      font-weight: 600;
      color: #374151;
    }

    .md-body tr:hover td { background: #fafafa; }

    .md-body hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 28px 0;
    }

    .md-body a { color: #9333ea; text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }

    .md-body img {
      max-width: 100%;
      border-radius: 8px;
      margin: 8px 0;
    }

    .hidden { display: none !important; }

    /* ── Responsive ───────────────────────── */
    @media (max-width: 720px) {
      :root { --sidebar-w: 220px; }
      .content-scroll { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <div class="brand-name">
      <h1>EXP Notes</h1>
    </div>
    <div class="brand-sub" style="color: #c3c3c3">EXP Produções</div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="search" placeholder="Buscar anotações…" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <nav class="nav" id="nav"></nav>
</aside>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">
      <span style="color:#9ca3af">Selecione uma nota</span>
    </div>
  </div>

  <div class="content-scroll">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">📋</div>
      <h2>EXP Notes</h2>
      <p>Selecione uma categoria e uma nota<br>no menu lateral para visualizar.</p>
    </div>

    <div class="loading hidden" id="loading">Carregando…</div>

    <div class="md-body hidden" id="md-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  const CATEGORY_ICONS = {
    'REUNIÃO PLANNING': '📅',
    'CIA 26': '🎪',
    'ABCZ': '🎵',
    'ARTISTICO': '🎨',
    'FORMS': '📝',
    'PROCESSOS': '⚙️',
    'ARCHIVE': '🗂️',
    'PROMPTS': '💬',
    'UBERLANDIA - HENRIQUE E JULIANO': '🎤',
    'CHURRASCO ARMAZÉM': '🍖',
    'Descritivos': '📄',
    'GERAL': '📌',
  };

  const DEFAULT_ICON = '📁';

  let indexData = null;
  let currentPath = null;

  marked.setOptions({ breaks: true, gfm: true });

  async function init() {
    try {
      const res = await fetch('index.json');
      if (!res.ok) throw new Error('index.json not found');
      indexData = await res.json();
      renderNav(indexData, '');
    } catch (e) {
      document.getElementById('nav').innerHTML =
        '<div class="empty-search">Erro ao carregar índice.</div>';
      return;
    }

    const hash = decodeURIComponent(location.hash.slice(1));
    if (hash) loadNote(hash);

    window.addEventListener('hashchange', () => {
      const p = decodeURIComponent(location.hash.slice(1));
      if (p) loadNote(p);
    });
  }

  function renderNav(data, filter) {
    const nav = document.getElementById('nav');
    nav.innerHTML = '';
    const q = filter.toLowerCase().trim();
    let total = 0;

    const allCats = [...data.categories];
    if (data.root_files && data.root_files.length) {
      allCats.push({ name: 'GERAL', files: data.root_files });
    }

    for (const cat of allCats) {
      const files = q
        ? cat.files.filter(f => f.name.toLowerCase().includes(q))
        : cat.files;

      if (!files.length) continue;
      total += files.length;

      const isOpen = q || (currentPath && currentPath.startsWith(cat.name + '/')) || cat.name === 'GERAL';
      const icon = CATEGORY_ICONS[cat.name] || DEFAULT_ICON;

      const block = document.createElement('div');
      block.className = 'cat-block' + (isOpen ? ' open' : '');

      block.innerHTML = `
        <div class="cat-header">
          <span>${esc(cat.name)}</span>
          <span class="cat-arrow">▶</span>
        </div>
        <div class="cat-files">
          ${files.map(f => `
            <div class="file-item${currentPath === f.path ? ' active' : ''}"
                 data-path="${esc(f.path)}"
                 title="${esc(f.name)}">
              ${esc(f.name)}
            </div>
          `).join('')}
        </div>
      `;

      block.querySelector('.cat-header').addEventListener('click', () => {
        block.classList.toggle('open');
      });

      block.querySelectorAll('.file-item').forEach(el => {
        el.addEventListener('click', () => {
          location.hash = encodeURIComponent(el.dataset.path);
        });
      });

      nav.appendChild(block);
    }

    if (total === 0) {
      nav.innerHTML = '<div class="empty-search">Nenhuma nota encontrada.</div>';
    }
  }

  async function loadNote(path) {
    currentPath = path;
    renderNav(indexData, document.getElementById('search').value);

    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('md-body').classList.add('hidden');
    document.getElementById('loading').classList.remove('hidden');

    setBreadcrumb(path);

    try {
      const url = 'notes/' + path.split('/').map(encodeURIComponent).join('/');
      const res = await fetch(url);
      if (!res.ok) throw new Error('File not found: ' + url);
      const text = await res.text();

      const body = document.getElementById('md-body');
      body.innerHTML = marked.parse(text);
      body.classList.remove('hidden');
      document.getElementById('loading').classList.add('hidden');

      document.querySelector('.content-scroll').scrollTop = 0;
    } catch (e) {
      const body = document.getElementById('md-body');
      body.innerHTML = `<p style="color:#ef4444">Erro ao carregar o arquivo.<br><small>${esc(e.message)}</small></p>`;
      body.classList.remove('hidden');
      document.getElementById('loading').classList.add('hidden');
    }
  }

  function setBreadcrumb(path) {
    const parts = path.split('/');
    const bc = document.getElementById('breadcrumb');
    if (parts.length > 1) {
      const cat = parts[0];
      const name = parts[parts.length - 1].replace(/\.md$/i, '');
      bc.innerHTML = `
        <span class="bc-cat">${esc(cat)}</span>
        <span class="bc-sep">/</span>
        <span class="bc-name">${esc(name)}</span>
      `;
    } else {
      bc.innerHTML = `<span class="bc-name">${esc(path.replace(/\.md$/i, ''))}</span>`;
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('search').addEventListener('input', e => {
    if (indexData) renderNav(indexData, e.target.value);
  });

  init();
</script>
</body>
</html>
